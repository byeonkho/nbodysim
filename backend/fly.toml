# Fly.io configuration for the spacesim backend.
# Before first deploy:
#   1. Run `fly launch --no-deploy` to register the app and get an app name,
#      then update `app` below.
#   2. Set secrets: `fly secrets set ALLOWED_ORIGINS=https://<your-vercel-domain>`
#   3. Run `fly deploy` from this directory.

app = "spacesim-api"        # replace with your fly.io app name
primary_region = "syd"      # change to your preferred region

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  # Keep at least one machine warm so first-load doesn't pay a 5–10s cold start.
  # Costs slightly more than min=0 but matters for the portfolio first impression.
  min_machines_running = 1

  # Allow long-lived WebSocket connections
  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 40

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

[[http_service.checks]]
  grace_period = "15s"
  interval = "15s"
  method = "GET"
  path = "/actuator/health"
  port = 8080
  timeout = "5s"
