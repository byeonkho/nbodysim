spring.application.name=spacesim

# Bind the port the host assigns. Railway (and other container hosts) inject a
# PORT env var and route to it; fall back to 8080 for local dev + the Docker
# EXPOSE, so nothing changes when PORT is unset.
server.port=${PORT:8080}

# Use Java 21 virtual threads for the request executor — each in-flight chunk
# request ties up a Tomcat worker for hundreds of milliseconds, so the gain
# is concrete (effectively unlimited concurrent simulations) and the change
# is one line. Spring Boot 3.2+ wires these in automatically.
spring.threads.virtual.enabled=true

# Actuator: expose only /health (used by the platform health check)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# JPL Horizons (the only outbound HTTP client) gets explicit timeouts so a hung
# JPL socket fails fast into the retry/backoff instead of pinning the thread
# holding the global one-request-at-a-time permit and stalling every
# Horizons-sourced body. Applies to the auto-configured RestClient.Builder.
spring.http.client.connect-timeout=5s
spring.http.client.read-timeout=10s

# Don't leak internal exception detail to clients on error responses. The
# controller maps known bad input to 400/503 explicitly; anything uncaught
# falls through to a clean 500 with no message / stacktrace / binding detail.
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-binding-errors=never

# HTTP response compression (gzip). The /ground-truth endpoint ships ~0.5 MB of
# numeric JSON per 1-year fetch; gzip cuts that ~64% with no client change
# (browsers decompress transparently). Deliberately scoped to text/JSON mime
# types: the /chunk payload is application/octet-stream (already zstd-compressed),
# so it is excluded here and never double-compressed. min-response-size avoids
# spending CPU on tiny responses (e.g. an error body).
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/plain,text/html,text/css,application/javascript
server.compression.min-response-size=1024

# CORS: comma-separated list of allowed origin patterns (Spring's pattern syntax).
# Default permits any port on localhost / 127.0.0.1 for dev convenience (Next falls
# back to 3001 when 3000 is taken; Chrome treats localhost and 127.0.0.1 as distinct).
# Override via ALLOWED_ORIGINS env var in prod (set to your Vercel domain).
ALLOWED_ORIGINS=http://localhost:[*],http://127.0.0.1:[*]