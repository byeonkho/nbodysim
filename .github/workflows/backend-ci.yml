name: Backend CI

on:
  push:
    branches: [master]
    paths: [backend/**]
  pull_request:
    branches: [master]
    paths: [backend/**]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Build and test
        run: cd backend && ./mvnw verify -q
