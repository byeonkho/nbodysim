name: Frontend CI

on:
  push:
    branches: [master]
    paths: [frontend/**, backend/openapi.json]
  pull_request:
    branches: [master]
    paths: [frontend/**, backend/openapi.json]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Verify generated API types are up to date
        run: |
          cd frontend && npm run gen:api
          git diff --exit-code src/app/generated/api.ts \
            || (echo "::error::api.ts is stale vs backend/openapi.json. Run 'npm run gen:api' in frontend/ and commit." && exit 1)

      - name: Lint
        run: cd frontend && npm run lint

      - name: Test
        run: cd frontend && npm test

      - name: Build
        run: cd frontend && npm run build
